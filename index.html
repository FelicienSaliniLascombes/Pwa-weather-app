<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Nimbus</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link
      rel="apple-touch-icon"
      href="/images/icons/logo_weather_app_512.png"
    />
    <meta name="theme-color" content="#0D1F2D" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="app-header">
      <h1>Nimbus</h1>
      <button id="install-btn" class="install-btn" style="display: none">
        📲 Installer l'application
      </button>
      <div id="offline-banner" class="offline-banner">Mode Hors-Ligne</div>
    </header>

    <main id="main-content" class="container">
      <div id="view-home">
        <h2>Quelques capital européen</h2>
        <div id="european-capitals" class="grid-container"></div>
      </div>

      <div id="view-search" class="hidden">
        <h2>Rechercher</h2>
        <div class="search-box">
          <input
            type="text"
            id="city-input"
            placeholder="Quelle ville cherchez-vous ?"
          />
          <button id="search-btn">🔍 Rechercher la météo</button>
        </div>
        <div id="search-result"></div>
      </div>

      <div id="view-favs" class="hidden">
        <h2>Mes Favoris</h2>
        <div id="favorites-list"></div>
      </div>
    </main>

    <nav class="tab-bar">
      <button id="nav-search" class="tab-btn">
        <span>🔍</span><br />Recherche
      </button>
      <button id="nav-home" class="tab-btn active">
        <span>🏠</span><br />Accueil
      </button>
      <button id="nav-favs" class="tab-btn">
        <span>⭐</span><br />Favoris
      </button>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script src="js/favorites.js"></script>
  </body>
</html>
